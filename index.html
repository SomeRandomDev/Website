<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kim's storytime ❤️</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f7f4;
      color: #1a1a1a;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 64px;
      background: #ffffff;
      border-top: 0.5px solid rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      text-decoration: none;
      color: #bbb;
      font-size: 11px;
      transition: color 0.15s;
      padding: 6px 16px;
    }
    .nav-item i { font-size: 22px; }
    .nav-item.active { color: #2563eb; }

    /* ── Page header ── */
    .page-header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
    }
    .page-header h1 { font-size: 22px; font-weight: 500; color: #1a1a1a; }
    .page-header p  { font-size: 13px; color: #888; margin-top: 6px; }

    /* ── Story list ── */
    .story-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 1rem 1.5rem;
      max-width: 520px;
      margin: 0 auto;
    }

    /* ── Card (accordion) ── */
    .story-card {
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 14px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }
    .story-card.visible { opacity: 1; transform: translateY(0); }

    /* always-visible row */
    .card-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.85rem 0.9rem;
      cursor: pointer;
      user-select: none;
    }
    .card-num-badge {
      width: 36px; height: 36px; border-radius: 10px;
      background: #e8f0fd;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .card-num-badge span { font-size: 11px; font-weight: 500; color: #2563eb; }
    .card-title {
      flex: 1;
      font-size: 14px; font-weight: 500; color: #1a1a1a;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .heart-btn {
      background: none; border: none; cursor: pointer; padding: 4px;
      display: flex; align-items: center; flex-shrink: 0;
      opacity: 0.3; transition: opacity 0.15s, transform 0.15s;
    }
    .heart-btn.liked { opacity: 1; }
    .heart-btn:active { transform: scale(1.3); }
    .heart-btn i { font-size: 18px; color: #D4537E; }
    .chevron {
      flex-shrink: 0; display: flex; align-items: center;
      color: #bbb; transition: transform 0.25s ease;
    }
    .chevron i { font-size: 15px; }

    /* collapsible player */
    .card-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .card-body.open { max-height: 120px; }
    .body-inner {
      padding: 0 0.9rem 0.9rem;
      display: flex; flex-direction: column; gap: 8px;
    }
    .card-dur { font-size: 12px; color: #888; display: flex; align-items: center; gap: 4px; }

    .prog-track {
      width: 100%; height: 3px; background: rgba(0,0,0,0.08);
      border-radius: 99px; overflow: hidden; cursor: pointer;
    }
    .prog-fill {
      height: 100%; width: 0%;
      background: #2563eb; border-radius: 99px; transition: width 0.15s linear;
    }
    .controls { display: flex; align-items: center; gap: 10px; }
    .play-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 0.5px solid rgba(0,0,0,0.15); background: #f4f4f2;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: background 0.15s, transform 0.1s;
    }
    .play-btn:active { transform: scale(0.93); }
    .play-btn i { font-size: 15px; color: #1a1a1a; }
    .time-txt { font-size: 11px; color: #888; font-variant-numeric: tabular-nums; flex: 1; }

    audio { display: none; }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Stories for you ❤️</h1>
    <p>Hey Kim, so the whole website should work perfectly, I'm actually really proud of it all and how everything works, I wanted you to be able to "save" your favorites and be able to choose if you want a scary story or not. Enjoy!!</p>
  </div>

  <div class="story-list" id="list"></div>

  <!-- ── Bottom navigation ── -->
  <nav class="bottom-nav">
    <a href="/" class="nav-item">
      <i class="ti ti-book" aria-hidden="true"></i>
      <span>Stories</span>
    </a>
    <a href="scary" class="nav-item">
      <i class="ti ti-moon-stars" aria-hidden="true"></i>
      <span>Scary</span>
    </a>
    <a href="diary" class="nav-item">
      <i class="ti ti-notebook" aria-hidden="true"></i>
      <span>Diary</span>
    </a>
  </nav>

  <script>
    /* ── Highlight active nav tab ── */
    const page = location.pathname.split('/').pop() || '/';
    document.querySelectorAll('.nav-item').forEach(a => {
      if (a.getAttribute('href') === page || (page === '' && a.getAttribute('href') === '/')) {
        a.classList.add('active');
      }
    });

    /* ── EDIT YOUR STORIES HERE ── */
    const stories = [
      { title: "Meditation",                                    src: "AUDIO/Mindfullness.mp3" },
      { title: "The rainbowfish + Oh no, the Leaves are Gone", src: "AUDIO/fallleave.mp3" },
      { title: "Richard the Meerkat and the Little Gecko",     src: "AUDIO/Richardthemeerkatandthelittlegecko.mp3" },
      { title: "Princess Jessie and the Unicorn",              src: "AUDIO/PrincessJessieandtheUnicorn.mp3" },
      { title: "The bird girl",                                 src: "AUDIO/junglebird.mp3" },
    ];

    function fmt(s) {
      s = Math.floor(s);
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
    }

    const list = document.getElementById('list');
    const audioEls = [];
    const liked = JSON.parse(localStorage.getItem('story-likes') || '{}');

    stories.forEach((story, i) => {
      const card = document.createElement('div');
      card.className = 'story-card';
      card.innerHTML = `
        <div class="card-row" id="row-${i}">
          <div class="card-num-badge"><span>${String(i + 1).padStart(2, '0')}</span></div>
          <span class="card-title">${story.title}</span>
          <button class="heart-btn" id="heart-${i}" aria-label="Like ${story.title}">
            <i class="ti ti-heart" id="hearticon-${i}"></i>
          </button>
          <div class="chevron" id="chev-${i}"><i class="ti ti-chevron-down"></i></div>
        </div>
        <div class="card-body" id="body-${i}">
          <div class="body-inner">
            <audio id="audio-${i}" src="${story.src}" preload="metadata"></audio>
            <div class="card-dur">
              <i class="ti ti-clock" aria-hidden="true" style="font-size:11px"></i>
              <span id="dur-${i}">--:--</span>
            </div>
            <div class="prog-track" id="track-${i}">
              <div class="prog-fill" id="fill-${i}"></div>
            </div>
            <div class="controls">
              <button class="play-btn" id="btn-${i}" aria-label="Play ${story.title}">
                <i class="ti ti-player-play" id="icon-${i}"></i>
              </button>
              <span class="time-txt" id="time-${i}">0:00 / --:--</span>
            </div>
          </div>
        </div>
      `;
      list.appendChild(card);

      /* ── Accordion toggle ── */
      document.getElementById(`row-${i}`).addEventListener('click', (e) => {
        if (e.target.closest('.heart-btn')) return;
        const body = document.getElementById(`body-${i}`);
        const chev = document.getElementById(`chev-${i}`);
        const isOpen = body.classList.contains('open');
        document.querySelectorAll('.card-body.open').forEach(b => b.classList.remove('open'));
        document.querySelectorAll('.chevron').forEach(c => c.style.transform = '');
        if (!isOpen) {
          body.classList.add('open');
          chev.style.transform = 'rotate(180deg)';
        }
      });

      const audio = document.getElementById(`audio-${i}`);
      audioEls.push(audio);

      audio.addEventListener('loadedmetadata', () => {
        const d = fmt(audio.duration);
        document.getElementById(`dur-${i}`).textContent = d;
        document.getElementById(`time-${i}`).textContent = `0:00 / ${d}`;
      });
      audio.addEventListener('timeupdate', () => {
        const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
        document.getElementById(`fill-${i}`).style.width = `${Math.round(pct)}%`;
        const d = audio.duration ? fmt(audio.duration) : '--:--';
        document.getElementById(`time-${i}`).textContent = `${fmt(audio.currentTime)} / ${d}`;
      });
      audio.addEventListener('ended', () => {
        document.getElementById(`icon-${i}`).className = 'ti ti-player-play';
        document.getElementById(`fill-${i}`).style.width = '0%';
        audio.currentTime = 0;
      });

      document.getElementById(`btn-${i}`).addEventListener('click', () => {
        const isPlaying = !audio.paused;
        if (isPlaying) {
          audio.pause();
          document.getElementById(`icon-${i}`).className = 'ti ti-player-play';
        } else {
          audioEls.forEach((a, j) => {
            if (j !== i && !a.paused) {
              a.pause();
              document.getElementById(`icon-${j}`).className = 'ti ti-player-play';
            }
          });
          audio.play();
          document.getElementById(`icon-${i}`).className = 'ti ti-player-pause';
        }
      });

      document.getElementById(`track-${i}`).addEventListener('click', (e) => {
        if (!audio.duration) return;
        const rect = e.currentTarget.getBoundingClientRect();
        audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
      });

      document.getElementById(`heart-${i}`).addEventListener('click', function () {
        liked[i] = !liked[i];
        this.classList.toggle('liked', liked[i]);
        document.getElementById(`hearticon-${i}`).className = liked[i] ? 'ti ti-heart-filled' : 'ti ti-heart';
        localStorage.setItem('story-likes', JSON.stringify(liked));
      });
    });

    /* ── Restore saved likes ── */
    Object.keys(liked).forEach(k => {
      if (!liked[k]) return;
      const btn = document.getElementById(`heart-${k}`);
      if (btn) {
        btn.classList.add('liked');
        document.getElementById(`hearticon-${k}`).className = 'ti ti-heart-filled';
      }
    });

    /* ── Scroll reveal ── */
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.08 });
    document.querySelectorAll('.story-card').forEach((c, i) => {
      c.style.transitionDelay = `${i * 0.04}s`;
      io.observe(c);
    });
  </script>

</body>
</html>
