<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kim's Storytime</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #1a1a1a;
      min-height: 100vh;
    }

    .page-header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
    }
    .page-header h1 {
      font-size: 22px;
      font-weight: 500;
      color: #1a1a1a;
    }
    .page-header p {
      font-size: 13px;
      color: #888;
      margin-top: 6px;
    }

    .story-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 1rem 3rem;
      max-width: 520px;
      margin: 0 auto;
    }

    .story-card {
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 14px;
      padding: 1rem;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.45s ease, transform 0.45s ease, border-color 0.2s;
    }
    .story-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .card-num-badge {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: #e8f0fd;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .card-num-badge span {
      font-size: 12px;
      font-weight: 500;
      color: #2563eb;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-title {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a1a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-dur {
      font-size: 12px;
      color: #888;
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .audio-wrap { display: flex; flex-direction: column; gap: 8px; }

    .prog-track {
      width: 100%;
      height: 3px;
      background: rgba(0,0,0,0.08);
      border-radius: 99px;
      overflow: hidden;
      cursor: pointer;
    }
    .prog-fill {
      height: 100%;
      width: 0%;
      background: #2563eb;
      border-radius: 99px;
      transition: width 0.15s linear;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .play-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 0.5px solid rgba(0,0,0,0.15);
      background: #f4f4f2;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    .play-btn:active { transform: scale(0.93); }
    .play-btn i { font-size: 15px; color: #1a1a1a; }

    .time-txt {
      font-size: 11px;
      color: #888;
      font-variant-numeric: tabular-nums;
      flex: 1;
    }

    .heart-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      opacity: 0.35;
      transition: opacity 0.15s, transform 0.15s;
    }
    .heart-btn.liked { opacity: 1; }
    .heart-btn:active { transform: scale(1.25); }
    .heart-btn i { font-size: 18px; color: #D4537E; }

    /* Real audio element — hidden, one per card */
    audio { display: none; }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Stories for you ♡</h1>
    <p>Hey Kim I'm STILL working on the favourite button but first I needed to make those sections for you</p>
  </div>

  <div class="story-list" id="list"></div>

  <script>
    /*
    ─────────────────────────────────────────────
      EDIT THIS ARRAY to match your actual files.
      Each object needs:
        title    — displayed title
        src      — path to your audio file
                   (relative, e.g. "audio/story-01.mp3"
                    or absolute URL)
    ─────────────────────────────────────────────
    */
    const stories = [
      { title: "One of us had to die",           src: "AUDIO/Oneofushadtodie.mp3" },
      { title: "My mother's lullaby wasn't meant for us",           src: "AUDIO/MyMothersLullabyWasntMeantforUs.mp3" },
      { title: "Meditation",           src: "AUDIO/Mindfullness.mp3" },
      { title: "The story of the tired moon",           src: "AUDIO/TheStoryofthetiredmoon.mp3" },
      { title: "When Sunny went away",              src: "AUDIO/WhenSunnyWentAway.mp3" },
      { title: "Daddy's never gonna hurt you again",              src: "AUDIO/NeverGonnaHurtYouAgain.mp3" },
      { title: "My girlfriend talks in her sleep",            src: "AUDIO/MyGirlfriendTalksinHerSleep.mp3" },
      { title: "If They Call Your Name, Never Answer",            src: "AUDIO/neveranswer.mp3" },
      { title: "I Found a Hidden Door in My Basement. I Wish I Had Never Opened It.",          src: "AUDIO/hiddenbasementdoor.mp3" },
      { title: "My online film student kept filming the same dead oak tree",                    src: "AUDIO/deadoaktree.mp3" },
      { title: "he has no face.",          src: "AUDIO/hehasnoface.mp3" },
      { title: "My boyfriend is obsessed with me when I get sick. I just discovered why.",                 src: "AUDIO/sneeze.mp3" },
      { title: "Emergency alert Part1",  src: "AUDIO/emergencyalert.mp3" },
      { title: "Search and Rescue Officer for the US Forest Service",                 src: "AUDIO/SAROfficer.mp3" },
      { title: "Something went wrong with my heart transplant",           src: "AUDIO/hearttransplant.mp3" },
      { title: "The rainbowfish + Oh no, the Leaves are Gone",         src: "AUDIO/fallleave.mp3" },
      { title: "Richard the Meerkat and the Little Gecko",         src: "AUDIO/Richardthemeerkatandthelittlegecko.mp3" },
      { title: "Princess Jessie and the Unicorn",         src: "AUDIO/PrincessJessieandtheUnicorn.mp3" },
      { title: "The bird girl",              src: "AUDIO/junglebird.mp3" },
    ];

    function fmt(s) {
      s = Math.floor(s);
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
    }

    const list = document.getElementById('list');
    const audioEls = [];
    const liked = {};

    stories.forEach((story, i) => {
      const card = document.createElement('div');
      card.className = 'story-card';

      card.innerHTML = `
        <audio id="audio-${i}" src="${story.src}" preload="metadata"></audio>
        <div class="card-top">
          <div class="card-num-badge"><span>${String(i + 1).padStart(2, '0')}</span></div>
          <div class="card-info">
            <div class="card-title">${story.title}</div>
            <div class="card-dur">
              <i class="ti ti-clock" aria-hidden="true" style="font-size:11px"></i>
              <span id="dur-${i}">--:--</span>
            </div>
          </div>
        </div>
        <div class="audio-wrap">
          <div class="prog-track" id="track-${i}">
            <div class="prog-fill" id="fill-${i}"></div>
          </div>
          <div class="controls">
            <button class="play-btn" id="btn-${i}" aria-label="Play ${story.title}">
              <i class="ti ti-player-play" id="icon-${i}"></i>
            </button>
            <span class="time-txt" id="time-${i}">0:00 / --:--</span>
            <button class="heart-btn" id="heart-${i}" aria-label="Like this story">
              <i class="ti ti-heart" id="hearticon-${i}"></i>
            </button>
          </div>
        </div>
      `;

      list.appendChild(card);

      const audio = document.getElementById(`audio-${i}`);
      audioEls.push(audio);

      audio.addEventListener('loadedmetadata', () => {
        const d = fmt(audio.duration);
        document.getElementById(`dur-${i}`).textContent = d;
        document.getElementById(`time-${i}`).textContent = `0:00 / ${d}`;
      });

      audio.addEventListener('timeupdate', () => {
        const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
        document.getElementById(`fill-${i}`).style.width = `${Math.round(pct)}%`;
        const d = audio.duration ? fmt(audio.duration) : '--:--';
        document.getElementById(`time-${i}`).textContent = `${fmt(audio.currentTime)} / ${d}`;
      });

      audio.addEventListener('ended', () => {
        document.getElementById(`btn-${i}`).dataset.playing = '0';
        document.getElementById(`icon-${i}`).className = 'ti ti-player-play';
        document.getElementById(`fill-${i}`).style.width = '0%';
        audio.currentTime = 0;
      });

      document.getElementById(`btn-${i}`).addEventListener('click', () => {
        const isPlaying = audio.paused === false;
        if (isPlaying) {
          audio.pause();
          document.getElementById(`icon-${i}`).className = 'ti ti-player-play';
        } else {
          audioEls.forEach((a, j) => {
            if (j !== i && !a.paused) {
              a.pause();
              document.getElementById(`icon-${j}`).className = 'ti ti-player-play';
            }
          });
          audio.play();
          document.getElementById(`icon-${i}`).className = 'ti ti-player-pause';
        }
      });

      document.getElementById(`track-${i}`).addEventListener('click', (e) => {
        if (!audio.duration) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const ratio = (e.clientX - rect.left) / rect.width;
        audio.currentTime = ratio * audio.duration;
      });

      document.getElementById(`heart-${i}`).addEventListener('click', function () {
        liked[i] = !liked[i];
        this.classList.toggle('liked', liked[i]);
        document.getElementById(`hearticon-${i}`).className = liked[i]
          ? 'ti ti-heart-filled'
          : 'ti ti-heart';
      });
    });

    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.08 });

    document.querySelectorAll('.story-card').forEach((c, i) => {
      c.style.transitionDelay = `${i * 0.04}s`;
      io.observe(c);
    });
  </script>

</body>
</html>
