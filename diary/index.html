<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My diary</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f7f4;
      color: #1a1a1a;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 64px;
      background: #ffffff;
      border-top: 0.5px solid rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      text-decoration: none;
      color: #bbb;
      font-size: 11px;
      transition: color 0.15s;
      padding: 6px 16px;
    }
    .nav-item i { font-size: 22px; }
    /* Diary page accent: rose */
    .nav-item.active { color: #D4537E; }

    /* ── Page header ── */
    .page-header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
    }
    .page-header h1 { font-size: 22px; font-weight: 500; color: #1a1a1a; }
    .page-header p  { font-size: 13px; color: #888; margin-top: 6px; }

    /* ── Entry list ── */
    .entry-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0 1rem 1.5rem;
      max-width: 520px;
      margin: 0 auto;
    }

    /* ── Diary card (text entry, no audio) ── */
    .diary-card {
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 14px;
      padding: 1.1rem 1rem;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }
    .diary-card.visible { opacity: 1; transform: translateY(0); }

    .diary-card-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .diary-badge {
      width: 38px; height: 38px; border-radius: 10px;
      background: #fce7ef;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .diary-badge i { font-size: 18px; color: #D4537E; }
    .diary-meta { flex: 1; min-width: 0; }
    .diary-title { font-size: 15px; font-weight: 500; color: #1a1a1a; }
    .diary-date  { font-size: 12px; color: #aaa; margin-top: 3px; }

    .diary-body {
      font-size: 14px;
      color: #444;
      line-height: 1.6;
      border-top: 0.5px solid rgba(0,0,0,0.07);
      padding-top: 10px;
      white-space: pre-wrap;
    }

    /* ── Audio diary card (entry with voice recording) ── */
    .audio-wrap { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    .prog-track {
      width: 100%; height: 3px; background: rgba(0,0,0,0.08);
      border-radius: 99px; overflow: hidden; cursor: pointer;
    }
    .prog-fill {
      height: 100%; width: 0%;
      background: #D4537E; border-radius: 99px; transition: width 0.15s linear;
    }
    .controls { display: flex; align-items: center; gap: 10px; }
    .play-btn {
      width: 38px; height: 38px; border-radius: 50%;
      border: 0.5px solid rgba(0,0,0,0.15); background: #f4f4f2;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: background 0.15s, transform 0.1s;
    }
    .play-btn:active { transform: scale(0.93); }
    .play-btn i { font-size: 15px; color: #1a1a1a; }
    .time-txt { font-size: 11px; color: #888; font-variant-numeric: tabular-nums; flex: 1; }
    audio { display: none; }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>My diary ♡</h1>
    <p>Things I wanted you to know</p>
  </div>

  <div class="entry-list" id="list"></div>

  <!-- ── Bottom navigation ── -->
  <nav class="bottom-nav">
    <a href="stories.html" class="nav-item">
      <i class="ti ti-book" aria-hidden="true"></i>
      <span>Stories</span>
    </a>
    <a href="scary" class="nav-item">
      <i class="ti ti-moon-stars" aria-hidden="true"></i>
      <span>Scary</span>
    </a>
    <a href="diary" class="nav-item">
      <i class="ti ti-notebook" aria-hidden="true"></i>
      <span>Diary</span>
    </a>
  </nav>

  <script>
    /* ── Highlight active nav tab ── */
    const page = location.pathname.split('/').pop() || 'diary.html';
    document.querySelectorAll('.nav-item').forEach(a => {
      if (a.getAttribute('href') === page) a.classList.add('active');
    });

    /*
    ─────────────────────────────────────────────────────────
      EDIT YOUR DIARY ENTRIES HERE.
      Each entry can be:
        - text only  →  { title, date, body }
        - audio only →  { title, date, src }
        - both       →  { title, date, body, src }
    ─────────────────────────────────────────────────────────
    */
    const entries = [
      {
        title: "The first time I saw you",
        date:  "January 12, 2024",
        body:  "Write your diary entry text here. It can be as long as you want — the card will expand to fit it.",
      },
      {
        title: "A voice note for you",
        date:  "February 3, 2024",
        src:   "audio/diary-01.mp3",
      },
      {
        title: "Something I never said out loud",
        date:  "March 20, 2024",
        body:  "Another text entry. You can mix and match text and audio entries in any order.",
        src:   "audio/diary-02.mp3",
      },
      /* add more entries as needed */
    ];

    function fmt(s) {
      s = Math.floor(s);
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
    }

    const list   = document.getElementById('list');
    const audios = [];

    entries.forEach((entry, i) => {
      const card = document.createElement('div');
      card.className = 'diary-card';

      const audioHTML = entry.src ? `
        <audio id="daudio-${i}" src="${entry.src}" preload="metadata"></audio>
        <div class="audio-wrap">
          <div class="prog-track" id="dtrack-${i}">
            <div class="prog-fill" id="dfill-${i}"></div>
          </div>
          <div class="controls">
            <button class="play-btn" id="dbtn-${i}" aria-label="Play entry">
              <i class="ti ti-player-play" id="dicon-${i}"></i>
            </button>
            <span class="time-txt" id="dtime-${i}">0:00 / --:--</span>
          </div>
        </div>` : '';

      const bodyHTML = entry.body
        ? `<div class="diary-body">${entry.body}</div>`
        : '';

      card.innerHTML = `
        <div class="diary-card-top">
          <div class="diary-badge"><i class="ti ti-${entry.src ? 'microphone' : 'pencil'}" aria-hidden="true"></i></div>
          <div class="diary-meta">
            <div class="diary-title">${entry.title}</div>
            <div class="diary-date">${entry.date}</div>
          </div>
        </div>
        ${bodyHTML}
        ${audioHTML}
      `;
      list.appendChild(card);

      if (entry.src) {
        const audio = document.getElementById(`daudio-${i}`);
        audios.push({ el: audio, idx: i });

        audio.addEventListener('loadedmetadata', () => {
          const d = fmt(audio.duration);
          document.getElementById(`dtime-${i}`).textContent = `0:00 / ${d}`;
        });
        audio.addEventListener('timeupdate', () => {
          const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
          document.getElementById(`dfill-${i}`).style.width = `${Math.round(pct)}%`;
          const d = audio.duration ? fmt(audio.duration) : '--:--';
          document.getElementById(`dtime-${i}`).textContent = `${fmt(audio.currentTime)} / ${d}`;
        });
        audio.addEventListener('ended', () => {
          document.getElementById(`dicon-${i}`).className = 'ti ti-player-play';
          document.getElementById(`dfill-${i}`).style.width = '0%';
          audio.currentTime = 0;
        });

        document.getElementById(`dbtn-${i}`).addEventListener('click', () => {
          const isPlaying = !audio.paused;
          if (isPlaying) {
            audio.pause();
            document.getElementById(`dicon-${i}`).className = 'ti ti-player-play';
          } else {
            audios.forEach(({ el, idx }) => {
              if (idx !== i && !el.paused) {
                el.pause();
                document.getElementById(`dicon-${idx}`).className = 'ti ti-player-play';
              }
            });
            audio.play();
            document.getElementById(`dicon-${i}`).className = 'ti ti-player-pause';
          }
        });

        document.getElementById(`dtrack-${i}`).addEventListener('click', (e) => {
          if (!audio.duration) return;
          const rect = e.currentTarget.getBoundingClientRect();
          audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        });
      }
    });

    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.08 });
    document.querySelectorAll('.diary-card').forEach((c, i) => {
      c.style.transitionDelay = `${i * 0.05}s`;
      io.observe(c);
    });
  </script>

</body>
</html>
