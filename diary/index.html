<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The impersonal Diary</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f7f4;
      color: #1a1a1a;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 64px;
      background: #ffffff;
      border-top: 0.5px solid rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      text-decoration: none;
      color: #bbb;
      font-size: 11px;
      transition: color 0.15s;
      padding: 6px 16px;
    }
    .nav-item i { font-size: 22px; }
    .nav-item.active { color: #D4537E; }

    /* ── Page header ── */
    .page-header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
    }
    .page-header h1 { font-size: 22px; font-weight: 500; color: #1a1a1a; }
    .page-header p  { font-size: 13px; color: #888; margin-top: 6px; }

    /* ── Entry list ── */
    .entry-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 0 1rem 1.5rem;
      max-width: 520px;
      margin: 0 auto;
    }

    /* ── Card (accordion) ── */
    .diary-card {
      background: #ffffff;
      border: 0.5px solid rgba(0,0,0,0.1);
      border-radius: 14px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }
    .diary-card.visible { opacity: 1; transform: translateY(0); }

    /* always-visible row */
    .card-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.85rem 0.9rem;
      cursor: pointer;
      user-select: none;
    }
    .diary-badge {
      width: 36px; height: 36px; border-radius: 10px;
      background: #fce7ef;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .diary-badge i { font-size: 16px; color: #D4537E; }
    .card-meta { flex: 1; min-width: 0; }
    .diary-title {
      font-size: 14px; font-weight: 500; color: #1a1a1a;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .diary-date { font-size: 11px; color: #aaa; margin-top: 2px; }

    .heart-btn {
      background: none; border: none; cursor: pointer; padding: 4px;
      display: flex; align-items: center; flex-shrink: 0;
      opacity: 0.3; transition: opacity 0.15s, transform 0.15s;
    }
    .heart-btn.liked { opacity: 1; }
    .heart-btn:active { transform: scale(1.3); }
    .heart-btn i { font-size: 18px; color: #D4537E; }

    .chevron {
      flex-shrink: 0; display: flex; align-items: center;
      color: #bbb; transition: transform 0.25s ease;
    }
    .chevron i { font-size: 15px; }

    /* collapsible body — height set dynamically by JS */
    .card-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .body-inner {
      padding: 0 0.9rem 0.9rem;
      display: flex; flex-direction: column; gap: 8px;
    }

    .diary-body {
      font-size: 14px;
      color: #444;
      line-height: 1.6;
      border-top: 0.5px solid rgba(0,0,0,0.07);
      padding-top: 10px;
      white-space: pre-wrap;
    }

    /* audio player inside body */
    .audio-wrap { display: flex; flex-direction: column; gap: 8px; padding-top: 8px; }
    .prog-track {
      width: 100%; height: 3px; background: rgba(0,0,0,0.08);
      border-radius: 99px; overflow: hidden; cursor: pointer;
    }
    .prog-fill {
      height: 100%; width: 0%;
      background: #D4537E; border-radius: 99px; transition: width 0.15s linear;
    }
    .controls { display: flex; align-items: center; gap: 10px; }
    .play-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 0.5px solid rgba(0,0,0,0.15); background: #f4f4f2;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: background 0.15s, transform 0.1s;
    }
    .play-btn:active { transform: scale(0.93); }
    .play-btn i { font-size: 15px; color: #1a1a1a; }
    .time-txt { font-size: 11px; color: #888; font-variant-numeric: tabular-nums; flex: 1; }

    audio { display: none; }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>My thoughts ❤️</h1>
    <p>All the things I wish we could talk about</p>
  </div>

  <div class="entry-list" id="list"></div>

  <!-- ── Bottom navigation ── -->
  <nav class="bottom-nav">
    <a href="/" class="nav-item">
      <i class="ti ti-book" aria-hidden="true"></i>
      <span>Stories</span>
    </a>
    <a href="scary" class="nav-item">
      <i class="ti ti-moon-stars" aria-hidden="true"></i>
      <span>Scary</span>
    </a>
    <a href="diary" class="nav-item">
      <i class="ti ti-notebook" aria-hidden="true"></i>
      <span>Diary</span>
    </a>
  </nav>

  <script>
    /* ── Highlight active nav tab ── */
    const page = location.pathname.split('/').pop();
    document.querySelectorAll('.nav-item').forEach(a => {
      if (a.getAttribute('href') === page) a.classList.add('active');
    });

    /*
    ─────────────────────────────────────────────────────────
      EDIT YOUR DIARY ENTRIES HERE.
      Each entry can be:
        - text only  →  { title, date, body }
        - audio only →  { title, date, src }
        - both       →  { title, date, body, src }
    ─────────────────────────────────────────────────────────
    */
    const entries = [
      {
        title: "The beginning of something new",
        date: "Friday, June 20, 2026",
        body: "Here's the first entry in this one of a kind diary. Diaries have historically always been a personal thing, never meant to be shared with anyone. That's why this one is going to be a special one.\n\nKim have you ever thought about how once things have a name they become more normal?\n\nThe concept of a shared personal diary was never really a thing I guess but if I give it a name maybe it will feel to us two as something more normal than what it really is ?\n\nI guess the impersonal diary could do the job, you know me Kim I was always more of a pragmatic guy before anything else. \n\nI’m not sure what I am trying to achieve throughout this ordeal. But I’ve been thinking about writing stuff to you for so many days that I thought there’s got to be a better way and I got the idea of writing this to you even if it could possibly be that you don’t even open this website anymore. \n\nMaybe you will and you’ll get to see my thoughts, maybe you won’t and I will simply write all of this into the void, in any case I like the idea of a place where all my thoughts are for you to see (and consequently the rest of the world but I’ll figure that out someday). \n\nA place where I can share with the real Kim everything that’s happening within my mind with the Kim that still lives there in my thoughts, in my dreams every single day. \n\nI feel like we don’t create enough anymore and this “we” is a very broad we. I’m going to use this as a first step towards creating something. \n\nNow I’ve just realised that this one will be extremely long as it will hold all the thoughts I remember having for multiple days. I hope if you ever read this you don’t become bored. \n\nAs I write this I keep opening WhatsApp and seeing you online, when I wrote this it was 02:32 we had that last discussion that started in the morning with me trying to explain why I’m still so jealous. \n\nI’m wondering if you’re discussing with him, talking about funny stuff with your friends, or doing like me and reading our old messages. \n\nI say this because I have been doing this a ton these last few days. Even before I realised you had someone new in your life. \n\nI went through our texts in the period leading to our first meeting. It was so beautiful, you were so radiant with energy. We were so damn cute. I went through the texts while I was in Bielefeld for the first time when I had slept in the car. We were so ready to see each other again. \n\nLife was truly beautiful. \n\nIt’s now 38 and you’re still online did you fall asleep on the phone ?\n\nI just wish I could see you even from a distance, get closer and give you a smile I’d be bawling my eyes out but the things I would do to be able to hold you, put my hand in the back of your head and make you feel safe. \n\nI crave you with every cell in my body Kim. \n\nAnd what’s worse is that it’s only been increasing. All of my partners I managed to move on even my very first love. But with you I feel a clear difference. \n\nYou’re the only one that truly understood me, the only one who actually made me smile by your presence. Made me laugh. Never judged me \n\n45 I see that you’re not online anymore I hope you’ll sleep tight and have nice dreams Mausi. \n\nYou keep saying that you’ve stopped holding onto what could’ve been so you can finally heal, and I’m truly happy to hear you say that because in the future I think you’ll manage to do that for good. \n\nBut as for me. \n\nI want none of that. \n\nI want you to move on. \n\nBut I do not want to move on. I want to stay as deeply in love with you as I can. I want to suffer and crave you every day. I want to wake up every morning hugging my pillow as if it was my Mausi. \n\nThat feeling I got when falling asleep with you, is without the shadow of a doubt the absolute climax of human experience. Knowing the person I for once my life was truly in love with, and in return was truly in love with me. \n\nThe fact that you felt safe in my arms even if this whole situation could have been dangerous for you. The fact that you brought Hundi with you and that you both felt safe in my arms. \n\nI know that nothing will ever make me feel more at peace \n\n55 you’re still offline it looks like you really are asleep. \n\nWhat I would give to just wrap my arms around you this instant. \n\nI’ve been thinking about myself throughout our breakup, why I am the way I am. \n\nBecause I think our breakup is my sole responsibility. Simply because I can’t accept criticism and I take everything personally. \n\nI think that to this day this was what made you lose faith in us. \n\nA part of me tells me if I could just get rid of this, I could be the man you loved without all the negativity that pushed you away. \n\nDo people not change ?\n\nAm I doomed to always be so easily annoyed? I refuse to accept that the answer is yes. I refuse to be that person so much. It wasn’t always me I remember being a different person years ago. \n\nBut these are only thoughts what matters will always be actions. \n\nThat’s why I’ve decided I was going to change. \n\nNot just for us Kim. But first for me, so that I can one day feel safe in approaching you knowing full well that I could give you the life you deserve. \n\nI don’t want to be your man while I am so weak. I want to be capable of loving you rightfully before that. \n\nThis isn’t the first time I’ve been thinking about this. I have actually started applying this to my daily life. I’m trying to not get angry at all anymore. \n\nFirst by trying to notice when a situation could lead to me raising my voice and remembering you. Remembering what pushed you away and it’s instantly better. \n\nI’ve tried driving without even the slightest hint that I’m angry and I can already tell a difference. I don’t scream when people cut me off or behave like idiots on the road. I make sure I don't get annoyed at my mother anymore. I make sure my colleagues at work don't feel when I'm annoyed.\n And you're helping me in each of those situations, I think about us holding each other in our arms, falling asleep or I think the prettiest sight I have ever laid my eyes on.\n I think about your eyes when I was holding you in my arms and staring at you there was special in your already incredible eyes. \n\nYou’re like a lighthouse bringing me back to safe grounds in my own mind. \n\nI want to be the best version of myself.\n\nFor me \n\nFor us\n\nFor you \n\nFor all those promises I’ve made that I still want to make a reality. \n\nWill this ever be enough? \n\nWill you ever even feel like reaching out to me so I could prove to you that I’ve changed?\n\nWill those changes be significant enough for you to start wondering if you could trust me again? \n\nWill you find someone who actually could fill those shoes and will make you happy. \n\nIt’s selfish for me to say this but a part of me wants to make sure it’s going to be me because only I can make sure that you’re safe and living a good life. How could I trust a stranger with my Kim ?\n\nI cannot accept it that easily \n\nRecently I have been thinking about that picture of the burning flowers how good it looked and how you kept it on your phone for so long. \n\nI want to make an even better version of it. \n\nI have had this vision in my head for weeks now \n\nMy whole left arm and the flowers engulfed in flames, the flowers would be pointed towards a black space in the picture. \n\nAnd you would be either represented by the 7 planets or a shadowy figure. \n\nI need to see this vision come to life. I feel like an artist that needs to express himself. Do you remember why the 7 planets ?\n\nOur first meeting was the day the 7 planets aligned in the sky the next will be in 2040 I find it so poetic. \n\nBut I can’t wait for them to realign in 2040 I want to realign them myself before\n\nIt’s getting quite late 03:28 I’m going to go to bed my reason to keep going \n\nI love this nickname but I wish I found a language that expressed this in a manner that pleased my ears. \n\nI hope you’re doing good wherever you are "
      },
];

    function fmt(s) {
      s = Math.floor(s);
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
    }

    const list   = document.getElementById('list');
    const audios = [];
    const liked  = JSON.parse(localStorage.getItem('diary-likes') || '{}');

    entries.forEach((entry, i) => {
      const card = document.createElement('div');
      card.className = 'diary-card';

      const audioHTML = entry.src ? `
        <audio id="daudio-${i}" src="${entry.src}" preload="metadata"></audio>
        <div class="audio-wrap">
          <div class="prog-track" id="dtrack-${i}">
            <div class="prog-fill" id="dfill-${i}"></div>
          </div>
          <div class="controls">
            <button class="play-btn" id="dbtn-${i}" aria-label="Play entry">
              <i class="ti ti-player-play" id="dicon-${i}"></i>
            </button>
            <span class="time-txt" id="dtime-${i}">0:00 / --:--</span>
          </div>
        </div>` : '';

      const bodyHTML = entry.body
        ? `<div class="diary-body">${entry.body}</div>`
        : '';

      card.innerHTML = `
        <div class="card-row" id="row-${i}">
          <div class="diary-badge">
            <i class="ti ti-${entry.src ? 'microphone' : 'pencil'}" aria-hidden="true"></i>
          </div>
          <div class="card-meta">
            <div class="diary-title">${entry.title}</div>
            <div class="diary-date">${entry.date}</div>
          </div>
          <button class="heart-btn" id="heart-${i}" aria-label="Like this entry">
            <i class="ti ti-heart" id="hearticon-${i}"></i>
          </button>
          <div class="chevron" id="chev-${i}"><i class="ti ti-chevron-down"></i></div>
        </div>
        <div class="card-body" id="body-${i}">
          <div class="body-inner">
            ${audioHTML}
            ${bodyHTML}
          </div>
        </div>
      `;
      list.appendChild(card);

      /* ── Accordion toggle with dynamic height ── */
      document.getElementById(`row-${i}`).addEventListener('click', (e) => {
        if (e.target.closest('.heart-btn')) return;
        const body = document.getElementById(`body-${i}`);
        const chev = document.getElementById(`chev-${i}`);
        const isOpen = body.classList.contains('open');

        document.querySelectorAll('.card-body.open').forEach(b => {
          b.style.maxHeight = '0';
          b.classList.remove('open');
        });
        document.querySelectorAll('.chevron').forEach(c => c.style.transform = '');

        if (!isOpen) {
          body.classList.add('open');
          body.style.maxHeight = body.scrollHeight + 'px';
          chev.style.transform = 'rotate(180deg)';
        }
      });

      /* ── Heart ── */
      document.getElementById(`heart-${i}`).addEventListener('click', function () {
        liked[i] = !liked[i];
        this.classList.toggle('liked', liked[i]);
        document.getElementById(`hearticon-${i}`).className = liked[i] ? 'ti ti-heart-filled' : 'ti ti-heart';
        localStorage.setItem('diary-likes', JSON.stringify(liked));
      });

      /* ── Audio player ── */
      if (entry.src) {
        const audio = document.getElementById(`daudio-${i}`);
        audios.push({ el: audio, idx: i });

        audio.addEventListener('loadedmetadata', () => {
          const d = fmt(audio.duration);
          document.getElementById(`dtime-${i}`).textContent = `0:00 / ${d}`;
        });
        audio.addEventListener('timeupdate', () => {
          const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
          document.getElementById(`dfill-${i}`).style.width = `${Math.round(pct)}%`;
          const d = audio.duration ? fmt(audio.duration) : '--:--';
          document.getElementById(`dtime-${i}`).textContent = `${fmt(audio.currentTime)} / ${d}`;
        });
        audio.addEventListener('ended', () => {
          document.getElementById(`dicon-${i}`).className = 'ti ti-player-play';
          document.getElementById(`dfill-${i}`).style.width = '0%';
          audio.currentTime = 0;
        });

        document.getElementById(`dbtn-${i}`).addEventListener('click', () => {
          const isPlaying = !audio.paused;
          if (isPlaying) {
            audio.pause();
            document.getElementById(`dicon-${i}`).className = 'ti ti-player-play';
          } else {
            audios.forEach(({ el, idx }) => {
              if (idx !== i && !el.paused) {
                el.pause();
                document.getElementById(`dicon-${idx}`).className = 'ti ti-player-play';
              }
            });
            audio.play();
            document.getElementById(`dicon-${i}`).className = 'ti ti-player-pause';
          }
        });

        document.getElementById(`dtrack-${i}`).addEventListener('click', (e) => {
          if (!audio.duration) return;
          const rect = e.currentTarget.getBoundingClientRect();
          audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        });
      }
    });

    /* ── Restore saved likes ── */
    Object.keys(liked).forEach(k => {
      if (!liked[k]) return;
      const btn = document.getElementById(`heart-${k}`);
      if (btn) {
        btn.classList.add('liked');
        document.getElementById(`hearticon-${k}`).className = 'ti ti-heart-filled';
      }
    });

    /* ── Scroll reveal ── */
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.08 });
    document.querySelectorAll('.diary-card').forEach((c, i) => {
      c.style.transitionDelay = `${i * 0.05}s`;
      io.observe(c);
    });
  </script>

</body>
</html>
